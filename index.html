<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>حامل الهاتف المغنطيسي</title>

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: #fff8ef;
  color: #1d1d1f;
}
.topbar { background:#111;color:#fff;text-align:center;padding:12px;font-weight:700; }
.urgent { background:#ff3d00;color:#fff;text-align:center;padding:10px;font-weight:800; }
.container { max-width:760px;margin:auto;padding:18px; }
.section { background:#fff;border-radius:24px;padding:22px;margin-top:18px; }

.form-grid { display:grid; gap:12px; }
label { font-size:18px; font-weight:800; }
input, select, textarea {
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:16px;
}
.buy-btn {
  background:linear-gradient(90deg,#ff3d00,#ff7b00);
  color:#fff;
  font-size:20px;
  font-weight:900;
  padding:16px;
  border-radius:14px;
  border:none;
  cursor:pointer;
}

.gallery {
  max-width:500px;
  margin:20px auto;
}
.main-image {
  width:100%;
  max-height:380px;
  object-fit:cover;
  border-radius:16px;
}
.thumbs {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}
.thumbs img {
  width:100%;
  height:80px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  border:2px solid transparent;
}
.thumbs img.active {
  border-color:#ff6a00;
}

.success {
  display:none;
  margin-top:12px;
  padding:12px;
  border-radius:10px;
  text-align:center;
  font-weight:700;
  background:#e8fff0;
  color:#0d7a37;
}
</style>
</head>

<body>

<div class="topbar">توصيل سريع لجميع المدن • الدفع عند الاستلام</div>
<div class="urgent">عرض محدود - الكمية قربات تسالي!</div>

<div class="container">

<div class="section" id="order">
  <h2>اطلب ديالك دابا</h2>

  <form id="leadForm" class="form-grid">

    <label>الاسم الكامل</label>
    <input id="full_name" required>

    <label>رقم الهاتف</label>
    <input id="phone" required>

    <label>المدينة</label>
    <select id="city" required>
      <option disabled selected>اختر المدينة</option>
      <option>الدار البيضاء</option>
      <option>الرباط</option>
      <option>سلا</option>
      <option>تمارة</option>
      <option>طنجة</option>
      <option>مراكش</option>
      <option>فاس</option>
      <option>أكادير</option>
      <option>وجدة</option>
      <option>القنيطرة</option>
      <option>الجديدة</option>
      <option>آسفي</option>
      <option>بني ملال</option>
      <option>الناظور</option>
      <option>الحسيمة</option>
      <option>الداخلة</option>
      <option>العيون</option>
    </select>

    <label>العنوان</label>
    <textarea id="address" required></textarea>

    <label>اختار العرض</label>
    <select id="quantity">
      <option value="1" data-price="99">1 قطعة - 99 درهم</option>
    </select>

    <button type="submit" class="buy-btn">أكد الطلب ديالي</button>

    <div id="successMsg" class="success">
      تم تأكيد طلبك بنجاح! غادي نتاصلوا بك قريباً 📞
    </div>

  </form>
</div>

<h1>حامل الهاتف المغنطيسي</h1>

<div class="gallery">
  <img src="main1.jpg" id="main" class="main-image">
  <div class="thumbs">
    <img src="4.jpg" onclick="changeImage(this)" class="active">
    <img src="5.jpg" onclick="changeImage(this)">
    <img src="6.jpg" onclick="changeImage(this)">
  </div>
</div>

</div>

<script>
// IMAGE SWITCH
function changeImage(el){
  document.getElementById('main').src = el.src;
  document.querySelectorAll('.thumbs img').forEach(img => img.classList.remove('active'));
  el.classList.add('active');
}

// GOOGLE SHEETS LINK
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDs-f3Ay4fOWrY_HWWijQYEoqCIuRQkKsZSz10oo2q-S1QF1ZLVagB3OabhX3mUR3cFQ/exec";

form.addEventListener('submit', function(e){
  e.preventDefault();

  const quantitySelect = document.getElementById('quantity');
  const selectedOption = quantitySelect.options[quantitySelect.selectedIndex];
  const price = selectedOption.getAttribute("data-price") || "99";

  const url = SCRIPT_URL +
    "?full_name=" + encodeURIComponent(document.getElementById('full_name').value) +
    "&phone=" + encodeURIComponent(document.getElementById('phone').value) +
    "&city=" + encodeURIComponent(document.getElementById('city').value) +
    "&address=" + encodeURIComponent(document.getElementById('address').value) +
    "&quantity=" + encodeURIComponent(quantitySelect.value) +
    "&price=" + encodeURIComponent(price);

  fetch(url);
});

  // SUCCESS MESSAGE
  successMsg.style.display = 'block';
  form.reset();

  window.scrollTo({
    top: successMsg.offsetTop - 100,
    behavior: 'smooth'
  });
});
</script>

</body>
</html>
