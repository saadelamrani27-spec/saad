    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: #fff8ef;

    }
    .topbar {
      background: #111;

      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
    }
    .urgent {

      color: #fff;

      padding: 10px 16px;
      font-weight: 800;

    .container {

      margin: 0 auto;
      padding: 18px 14px 48px;
    }
    h1 {
      font-size: 34px;
      line-height: 1.2;
      margin: 10px 0 10px;
      text-align: center;
    }
    .lead {
      font-size: 19px;
      text-align: center;
      color: #444;
      margin: 0 0 20px;
      font-weight: 600;
    }
    .gallery {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      padding: 14px;
    }
    .main-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      background: #f4f4f4;
    }
    .thumbs {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .thumbs img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 14px;
      cursor: pointer;
      border: 2px solid transparent;
      background: #f4f4f4;
    }
    .thumbs img.active { border-color: #ff6a00; }
    .price-box {
      background: #111;
      color: #fff;
      border-radius: 24px;
      padding: 18px 16px;

      margin-top: 18px;
      box-shadow: 0 12px 24px rgba(0,0,0,.14);
    }
    .discount {
      display: inline-block;
      background: #ff4d00;
      color: #fff;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 800;
      margin-bottom: 10px;
      font-size: 18px;
    }
    .old {
      text-decoration: line-through;
      opacity: .75;
      font-size: 25px;
      margin-top: 6px;
    }
    .new {
      font-size: 54px;
      line-height: 1;
      color: #ffd54a;
      font-weight: 900;
      margin: 8px 0;
    }
    .save {
      color: #72f39a;
      font-size: 18px;
      font-weight: 800;
    }
    .timer-wrap {
      text-align: center;
      background: #fff;
      border: 2px dashed #ff6a00;
      color: #111;
      border-radius: 20px;
      padding: 16px;
      margin-top: 18px;
    }
    .timer-title { font-weight: 800; font-size: 19px; margin-bottom: 8px; }
    .timer { font-size: 36px; font-weight: 900; color: #ff4d00; letter-spacing: 1px; }
    .usp-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
      margin-top: 18px;
    }
    .usp {
      background: #fff;
      border-radius: 18px;
      padding: 14px 10px;
      text-align: center;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
      font-size: 17px;
    }
    .section {
      background: #fff;
      border-radius: 24px;
      padding: 22px 18px;
      margin-top: 18px;
      box-shadow: 0 10px 26px rgba(0,0,0,.06);
    }
    h2 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.25;
      text-align: center;
    }
    ul {
      margin: 0;
      padding-right: 20px;
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    li { margin-bottom: 10px; }
    .order-intro {
      text-align: center;
      color: #444;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 18px;
    }
    .form-grid {
      display: grid;
      gap: 12px;
    }
    label {
      font-size: 19px;
      font-weight: 800;
      display: block;
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 18px;
      font-family: Tahoma, Arial, sans-serif;
      background: #fff;
    }
    .buy-btn {
      border: none;
      background: linear-gradient(90deg,#ff3d00,#ff7b00);
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      padding: 18px;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(255,98,0,.28);
      margin-top: 6px;
    }
    .buy-btn:hover { filter: brightness(1.03); }
    .cta {
      display: block;
      text-align: center;
      background: linear-gradient(90deg,#ff3d00,#ff7b00);
      color: #fff;
      font-weight: 900;
      font-size: 22px;
      text-decoration: none;
      padding: 18px;
      border-radius: 18px;
      margin: 18px 0 0;
      box-shadow: 0 10px 25px rgba(255,98,0,.28);
    }
    .success, .error {
      display: none;
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 14px;
      font-weight: 800;
      text-align: center;
      font-size: 17px;
    }
    .success { background: #e8fff0; color: #0d7a37; }
    .error { background: #fff0f0; color: #b12626; }
  </style>
