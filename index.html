<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: #fff8ef;
  color: #1d1d1f;
}
.topbar { background:#111;color:#fff;text-align:center;padding:12px;font-weight:700; }
.urgent { background:#ff3d00;color:#fff;text-align:center;padding:10px;font-weight:800; }
.container { max-width:760px;margin:auto;padding:18px; }
.section { background:#fff;border-radius:24px;padding:22px;margin-top:18px; }

.form-grid { display:grid; gap:12px; }
label { font-size:18px; font-weight:800; }
input, select, textarea {
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:16px;
}
.buy-btn {
  background:linear-gradient(90deg,#ff3d00,#ff7b00);
  color:#fff;
  font-size:20px;
  font-weight:900;
  padding:16px;
  border-radius:14px;
  border:none;
  cursor:pointer;
}

.gallery {
  max-width:500px;
  margin:20px auto;
}
.main-image {
  width:100%;
  max-height:380px;
  object-fit:cover;
  border-radius:16px;
}
.thumbs {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}
.thumbs img {
  width:100%;
  height:80px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  border:2px solid transparent;
}
.thumbs img.active {
  border-color:#ff6a00;
}

.success {
  display:none;
  margin-top:12px;
  padding:12px;
  border-radius:10px;
  text-align:center;
  font-weight:700;
  background:#e8fff0;
  color:#0d7a37;
}
</style>
