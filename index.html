<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>سدادة تصريف الأرضية</title>

<style>
/* KEEP YOUR ORIGINAL CSS */
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma;background:#fff8ef}
.container{max-width:760px;margin:auto;padding:18px}
.section{background:#fff;border-radius:20px;padding:20px;margin-top:18px}
</style>
</head>

<body>

<div class="container">

<!-- ✅ FORM NOW FIRST -->
<div class="section" id="order">
<h2>اطلب ديالك دابا</h2>

<form id="leadForm">

<input id="full_name" placeholder="الاسم الكامل" required>
<input id="phone" placeholder="رقم الهاتف" required>

<select id="city">
<option>الدار البيضاء</option>
<option>الرباط</option>
<option>مراكش</option>
</select>

<textarea id="address" placeholder="العنوان"></textarea>

<select id="quantity">
<option value="1" data-old="149" data-price="119">1 - 119</option>
<option value="2" data-old="219" data-price="169">2 - 169</option>
<option value="3" data-old="289" data-price="219">3 - 219</option>
</select>

<button type="submit">أكد الطلب</button>

</form>
</div>

<!-- ✅ EVERYTHING ELSE AFTER -->
<h1>سدادة تصريف الأرضية</h1>

<div class="gallery">
<img src="main1.jpg" id="main">
</div>

<div id="oldPrice">149 درهم</div>
<div id="newPrice">119 درهم</div>
<div id="savePrice">وفر 30 درهم</div>

<div id="timer">02:45:30</div>

</div>

<script>

// FIXED IMAGE
function swapImage(img){
document.getElementById('main').src = img.src;
}

// FIXED PRICE SCRIPT
const quantity = document.getElementById('quantity');
const oldPriceEl = document.getElementById('oldPrice');
const newPriceEl = document.getElementById('newPrice');
const savePriceEl = document.getElementById('savePrice');

quantity.addEventListener('change',()=>{
let option = quantity.options[quantity.selectedIndex];
let oldP = Number(option.dataset.old);
let newP = Number(option.dataset.price);

oldPriceEl.textContent = oldP + " درهم";
newPriceEl.textContent = newP + " درهم";
savePriceEl.textContent = "وفر " + (oldP - newP) + " درهم";
});

// TIMER
let seconds = 2*3600+45*60+30;
setInterval(()=>{
let h = String(Math.floor(seconds/3600)).padStart(2,'0');
let m = String(Math.floor((seconds%3600)/60)).padStart(2,'0');
let s = String(seconds%60).padStart(2,'0');
document.getElementById('timer').textContent = h+":"+m+":"+s;
if(seconds>0) seconds--;
},1000);

</script>

</body>
</html>
