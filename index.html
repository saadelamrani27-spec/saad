<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>سدادة تصريف الأرضية</title>

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: #fff8ef;
  color: #1d1d1f;
}
.topbar { background:#111;color:#fff;text-align:center;padding:12px;font-weight:700; }
.urgent { background:#ff3d00;color:#fff;text-align:center;padding:10px;font-weight:800; }
.container { max-width:760px;margin:auto;padding:18px; }
.section { background:#fff;border-radius:24px;padding:22px;margin-top:18px; }

.form-grid { display:grid; gap:12px; }
label { font-size:18px; font-weight:800; }
input, select, textarea {
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:16px;
}
.buy-btn {
  background:linear-gradient(90deg,#ff3d00,#ff7b00);
  color:#fff;
  font-size:20px;
  font-weight:900;
  padding:16px;
  border-radius:14px;
  border:none;
  cursor:pointer;
}

.price-box {
  background:#111;
  color:#fff;
  border-radius:24px;
  padding:20px;
  text-align:center;
  margin-top:18px;
}
</style>
</head>

<body>

<div class="topbar">توصيل سريع لجميع المدن • الدفع عند الاستلام</div>
<div class="urgent">عرض محدود - الكمية قربات تسالي!</div>

<div class="container">

<!-- FORM -->
<div class="section" id="order">
  <h2>اطلب ديالك دابا</h2>

  <form id="leadForm" class="form-grid">

    <label>الاسم الكامل</label>
    <input id="full_name" required>

    <label>رقم الهاتف</label>
    <input id="phone" required>

    <label>المدينة</label>
    <select id="city" required>
      <option disabled selected>اختر المدينة</option>
      <option>الدار البيضاء</option>
      <option>الرباط</option>
      <option>سلا</option>
      <option>تمارة</option>
      <option>مراكش</option>
      <option>فاس</option>
      <option>طنجة</option>
      <option>أكادير</option>
      <option>وجدة</option>
      <option>القنيطرة</option>
      <option>الجديدة</option>
      <option>آسفي</option>
      <option>خريبكة</option>
      <option>بني ملال</option>
      <option>الناظور</option>
      <option>الحسيمة</option>
      <option>الداخلة</option>
      <option>العيون</option>
    </select>

    <label>العنوان</label>
    <textarea id="address" required></textarea>

    <label>اختار العرض</label>
    <select id="quantity">
      <option value="1" data-old="149" data-price="119">1 قطعة - 119 درهم</option>
      <option value="2" data-old="219" data-price="169">2 قطع - 169 درهم</option>
      <option value="3" data-old="289" data-price="219">3 قطع - 219 درهم</option>
    </select>

    <input type="hidden" id="price" value="119">

    <button type="submit" class="buy-btn">أكد الطلب ديالي</button>

  </form>
</div>

<h1>سدادة تصريف الأرضية</h1>

<div class="gallery">

  <!-- MAIN IMAGE -->
  <img src="main1.jpg" id="main" class="main-image">

  <!-- THUMBNAILS -->
  <div class="thumbs">
    <img src="4.jpg" onclick="changeImage(this)" class="active">
    <img src="5.jpg" onclick="changeImage(this)">
    <img src="6.jpg" onclick="changeImage(this)">
  </div>

</div>

</div>

<script>
// PRICE UPDATE
const quantity = document.getElementById('quantity');
const oldPrice = document.getElementById('oldPrice');
const newPrice = document.getElementById('newPrice');
const savePrice = document.getElementById('savePrice');

quantity.addEventListener('change', () => {
  const opt = quantity.options[quantity.selectedIndex];
  const oldP = Number(opt.dataset.old);
  const newP = Number(opt.dataset.price);

  oldPrice.textContent = oldP + " درهم";
  newPrice.textContent = newP + " درهم";
  savePrice.textContent = "وفر " + (oldP - newP) + " درهم";
});
</script>

</body>
</html>
