<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سدادة تصريف الأرضية</title>
  <meta name="robots" content="noindex,nofollow" />

    n.queue=[];t=b.createElement(e);t.async=!0;

  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Tahoma,Arial;background:#fff8ef}
    .topbar{background:#111;color:#fff;text-align:center;padding:12px;font-weight:700}
    .urgent{background:linear-gradient(90deg,#ff3d00,#ff6a00);color:#fff;text-align:center;padding:10px;font-weight:800}
    .container{max-width:760px;margin:auto;padding:18px}
    h1{text-align:center}
    .section{background:#fff;border-radius:20px;padding:20px;margin-top:18px}
    input,select,textarea{width:100%;padding:12px;margin-top:6px;border-radius:12px;border:1px solid #ddd}
    .buy-btn{background:#ff3d00;color:#fff;padding:15px;border:none;border-radius:12px;font-weight:800;width:100%;margin-top:10px}
    .gallery img{width:100%;border-radius:15px}
    .price-box{text-align:center;background:#111;color:#fff;padding:15px;border-radius:20px;margin-top:15px}
    .cta{display:block;text-align:center;background:#ff3d00;color:#fff;padding:15px;border-radius:12px;margin-top:15px}
  </style>
</head>

<body>

<div class="topbar">توصيل سريع لجميع المدن • الدفع عند الاستلام</div>
<div class="urgent">عرض محدود - الكمية قربات تسالي!</div>

<div class="container">

<!-- ✅ FORM AT TOP -->
<div class="section" id="order">
  <h2>اطلب ديالك دابا</h2>

  <form id="leadForm">
    <label>الاسم الكامل</label>
    <input id="full_name" required>

    <label>رقم الهاتف</label>
    <input id="phone" required>

    <label>المدينة</label>
    <select id="city">
      <option>الدار البيضاء</option>
      <option>الرباط</option>
      <option>مراكش</option>
      <option>طنجة</option>
    </select>

    <label>العنوان</label>
    <textarea id="address"></textarea>

    <button class="buy-btn">أكد الطلب</button>
  </form>
</div>

<!-- ✅ PRODUCT NOW BELOW -->
<h1>سدادة تصريف الأرضية</h1>

<div class="gallery">
  <img src="main1.jpg" id="main">
</div>

<div class="price-box">
  <h2>119 درهم</h2>
</div>

<a href="#order" class="cta">اطلب دابا</a>

</div>

<script>
function swapImage(img){
  document.getElementById('main').src=img.src;
}
</script>

</body>
</html>
